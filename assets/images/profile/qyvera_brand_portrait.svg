<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="960" viewBox="0 0 800 960" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;display=swap');
      .font-sans { font-family: 'Inter', sans-serif; }
      .text-title { font-weight: 700; fill: #ffffff; font-size: 32px; letter-spacing: -0.03em; }
      .text-desc { font-weight: 400; fill: #71717a; font-size: 16px; line-height: 1.6; }
      .text-tag { font-weight: 700; fill: #ff1e00; font-size: 14px; letter-spacing: 0.05em; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="960" fill="#09090b" />

  <!-- Code/Tech Pattern Overlay -->
  <g stroke="#18181b" stroke-width="1">
    <line x1="80" y1="0" x2="80" y2="960" />
    <line x1="160" y1="0" x2="160" y2="960" />
    <line x1="240" y1="0" x2="240" y2="960" />
    <line x1="320" y1="0" x2="320" y2="960" />
    <line x1="400" y1="0" x2="400" y2="960" />
    <line x1="480" y1="0" x2="480" y2="960" />
    <line x1="560" y1="0" x2="560" y2="960" />
    <line x1="640" y1="0" x2="640" y2="960" />
    <line x1="720" y1="0" x2="720" y2="960" />
  </g>

  <!-- Giant Brand Icon (Q Intersecting with Circuits) -->
  <g transform="translate(400, 400)" stroke-linecap="round">
    <!-- Glowing backgrounds -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="#ff1e00" stroke-width="12" opacity="0.03" />
    <circle cx="0" cy="0" r="140" fill="none" stroke="#ff1e00" stroke-width="8" opacity="0.05" />
    
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#27272a" stroke-width="2" />
    
    <!-- Code Lines / Circuit Traces -->
    <path d="M -160 0 L -120 0" stroke="#27272a" stroke-width="2" />
    <path d="M 120 0 L 160 0" stroke="#27272a" stroke-width="2" />
    <path d="M 0 -160 L 0 -120" stroke="#27272a" stroke-width="2" />
    
    <!-- Animated Node Circles -->
    <circle cx="-160" cy="0" r="4" fill="#ff1e00" />
    <circle cx="160" cy="0" r="4" fill="#ff1e00" />
    <circle cx="0" cy="-160" r="4" fill="#ff1e00" />

    <!-- Sleek Red Accent Ring -->
    <path d="M -80 -80 A 113.14 113.14 0 0 1 80 -80 L 140 140" fill="none" stroke="#ff1e00" stroke-width="6" />
    <circle cx="140" cy="140" r="6" fill="#ff1e00" />
  </g>

  <!-- Typography -->
  <g transform="translate(80, 780)">
    <text x="0" y="0" class="font-sans text-tag">EST. 2026</text>
    <text x="0" y="44" class="font-sans text-title">Qyvera Technologies</text>
    <text x="0" y="80" class="font-sans text-desc">Sleek software engineering and high-performance digital systems.</text>
  </g>
</svg>