    <rect width="704" height="258" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1" />
    <!-- Browser Window Header -->
    <rect width="704" height="24" rx="8" fill="#09090b" />
    <circle cx="12" cy="12" r="3.5" fill="#ef4444" />
    <circle cx="22" cy="12" r="3.5" fill="#f59e0b" />
    <circle cx="32" cy="12" r="3.5" fill="#10b981" />
    <rect x="64" y="6" width="400" height="12" rx="4" fill="#18181b" />
    <text x="72" y="15" class="font-sans text-muted" font-size="8">https://app.qyvera.com/healthcare</text>

    <!-- Embedded Dashboard Content -->
    <g transform="translate(16, 40)">
      
    <g transform="translate(0, 0)">
    <rect width="160" height="60" fill="#09090b" rx="6" stroke="#27272a" stroke-width="1" />
    <text x="12" y="18" class="font-sans text-muted" font-size="8" fill="#71717a">Active Patients</text>
    <text x="12" y="38" class="font-sans text-metric" font-size="14" fill="#f4f4f5">14,892</text>
    <text x="12" y="52" class="font-sans" font-size="8" fill="#10b981">+12.4% this week</text>
    <rect x="142" y="10" width="6" height="6" rx="3" fill="#0ea5e9" />
  </g>
    <g transform="translate(170, 0)">
    <rect width="160" height="60" fill="#09090b" rx="6" stroke="#27272a" stroke-width="1" />
    <text x="12" y="18" class="font-sans text-muted" font-size="8" fill="#71717a">AI Recommendations</text>
    <text x="12" y="38" class="font-sans text-metric" font-size="14" fill="#f4f4f5">98.6%</text>
    <text x="12" y="52" class="font-sans" font-size="8" fill="#10b981">Accuracy confidence</text>
    <rect x="142" y="10" width="6" height="6" rx="3" fill="#10b981" />
  </g>
    <g transform="translate(0, 70)">
    <rect width="330" height="130" fill="#09090b" rx="6" stroke="#27272a" stroke-width="1" />
    <path d="M 10 110 Q 60 90 90 70 T 180 50 T 320 30" fill="none" stroke="#0ea5e9" stroke-width="1.5" />
    <line x1="8" y1="122" x2="322" y2="122" stroke="#27272a" stroke-width="0.5" />
  </g>
    <g transform="translate(340, 0)">
    <rect width="330" height="200" fill="#09090b" rx="6" stroke="#27272a" stroke-width="1" />
    <text x="8" y="14" class="font-sans text-heading" font-size="8" fill="#f4f4f5">Recent Clinical Diagnostics</text>
    <text x="8" y="28" class="font-sans" font-size="8" fill="#f4f4f5">Arthur Pendragon</text>
    <text x="90" y="28" class="font-sans" font-size="8" fill="#71717a">Acute Bronchitis</text>
    <text x="140" y="28" class="font-sans" font-size="8" fill="#10b981">99.4% Acc</text><text x="8" y="44" class="font-sans" font-size="8" fill="#f4f4f5">Gwen Stacey</text>
    <text x="90" y="44" class="font-sans" font-size="8" fill="#71717a">Type 2 Diabetes</text>
    <text x="140" y="44" class="font-sans" font-size="8" fill="#10b981">97.2% Acc</text><text x="8" y="60" class="font-sans" font-size="8" fill="#f4f4f5">John Watson</text>
    <text x="90" y="60" class="font-sans" font-size="8" fill="#71717a">Cardio Arrythmia</text>
    <text x="140" y="60" class="font-sans" font-size="8" fill="#10b981">98.9% Acc</text><text x="8" y="76" class="font-sans" font-size="8" fill="#f4f4f5">Bruce Banner</text>
    <text x="90" y="76" class="font-sans" font-size="8" fill="#71717a">Gamma Ray Tox</text>
    <text x="140" y="76" class="font-sans" font-size="8" fill="#10b981">99.9% Acc</text>
  </g>
  
    </g>
  </g>

  <!-- Floating UI Cards / Badges -->
  <g transform="translate(430, 95)">
    
    <g transform="translate(0, 0)">
    <rect width="260" height="70" fill="#18181b" rx="8" stroke="#27272a" stroke-width="1.5" filter="drop-shadow(0 10px 15px rgba(0,0,0,0.5))" />
    <circle cx="20" cy="20" r="6" fill="#10b981" />
    <text x="32" y="24" class="font-sans text-heading" font-size="9" fill="#f4f4f5">AI CLINICAL INSIGHTS</text>
    
      <text x="16" y="44" class="font-sans" font-size="10" fill="#71717a">Patient diagnosis automation activated.</text>
      <text x="16" y="58" class="font-sans" font-size="10" fill="#10b981">✓ Verified by Clinical Model V2.4</text>
    
  </g>
    <g transform="translate(40, 90)">
    <rect width="220" height="60" fill="#18181b" rx="8" stroke="#27272a" stroke-width="1.5" filter="drop-shadow(0 10px 15px rgba(0,0,0,0.5))" />
    <circle cx="20" cy="20" r="6" fill="#0ea5e9" />
    <text x="32" y="24" class="font-sans text-heading" font-size="9" fill="#f4f4f5">APPOINTMENT ENGINE</text>
    
      <text x="16" y="42" class="font-sans text-metric" font-size="14" fill="#f4f4f5">142 Scheduled Today</text>
    
  </g>
  
  </g>
</svg>