<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');
      .font-sans { font-family: 'Inter', -apple-system, sans-serif; }
      .text-title { font-weight: 800; fill: #f4f4f5; font-size: 26px; letter-spacing: -0.04em; line-height: 1.1; }
      .text-subhead { font-weight: 400; fill: #71717a; font-size: 13px; line-height: 1.5; }
      .text-heading { font-weight: 600; fill: #f4f4f5; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
      .text-logo { font-weight: 700; fill: #f4f4f5; font-size: 15px; letter-spacing: -0.02em; }
      .text-nav { font-weight: 500; fill: #71717a; font-size: 11px; }
      .text-btn { font-weight: 600; font-size: 11px; text-anchor: middle; }
    </style>
    <!-- Gradients -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#09090b" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background Grid -->
  <rect width="800" height="600" fill="#09090b" rx="12" />
  <circle cx="500" cy="350" r="350" fill="url(#glow)" />
  <g stroke="#18181b" stroke-width="0.75" opacity="0.3">
    <line x1="100" y1="0" x2="100" y2="600" />
    <line x1="200" y1="0" x2="200" y2="600" />
    <line x1="300" y1="0" x2="300" y2="600" />
    <line x1="400" y1="0" x2="400" y2="600" />
    <line x1="500" y1="0" x2="500" y2="600" />
    <line x1="600" y1="0" x2="600" y2="600" />
    <line x1="700" y1="0" x2="700" y2="600" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="400" x2="800" y2="400" />
    <line x1="0" y1="500" x2="800" y2="500" />
  </g>

  <!-- Navigation Bar -->
  <rect x="24" y="16" width="752" height="40" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1" />
  <circle cx="44" cy="36" r="6" fill="#0ea5e9" />
  <circle cx="44" cy="36" r="3" fill="#09090b" />
  <text x="56" y="41" class="font-sans text-logo">Qyvera</text>

  <g transform="translate(160, 40)" class="font-sans text-nav">
    <text x="0" y="0">Products</text>
    <text x="70" y="0">Features</text>
    <text x="140" y="0">Developers</text>
    <text x="220" y="0">Pricing</text>
  </g>

  <!-- Start Free Trial Button -->
  <rect x="680" y="24" width="84" height="24" rx="4" fill="#0ea5e9" />
  <text x="722" y="40" class="font-sans text-btn" fill="#09090b">Deploy App</text>

  <!-- Hero Section Content -->
  <g transform="translate(48, 100)">
    <!-- Category Badge -->
    <rect width="120" height="20" rx="10" fill="#27272a" />
    <circle cx="10" cy="10" r="3" fill="#10b981" />
    <text x="20" y="14" class="font-sans text-heading" fill="#10b981" font-size="9">AI Healthcare</text>

    <!-- Main Title -->
    <text x="0" y="55" class="font-sans text-title">Next-Gen AI Healthcare
Operations.</text>

    <!-- Subheading -->
    <text x="0" y="90" class="font-sans text-subhead">An intelligent platform designed to optimize patient tracking,
automate appointments, and streamline medical analytics.</text>

    <!-- Action Buttons -->
    <g transform="translate(0, 145)">
      <!-- CTA 1 -->
      <rect width="110" height="32" rx="6" fill="#0ea5e9" />
      <text x="55" y="20" class="font-sans text-btn" fill="#09090b">Deploy App</text>

      <!-- CTA 2 -->
      <rect x="124" width="110" height="32" rx="6" fill="#18181b" stroke="#27272a" stroke-width="1" />
      <text x="179" y="20" class="font-sans text-btn" fill="#f4f4f5">Book Demo</text>
    </g>
  </g>

  <!-- Embedded Product Mockup Frame (Slight Angled/Modern Presentation) -->
  <g transform="translate(48, 310)">
