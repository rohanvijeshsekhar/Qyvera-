<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="1200" viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark Background -->
  <rect width="800" height="1200" fill="#09090b" />
  
  <!-- Flowchart connections -->
  <g stroke="#18181b" stroke-width="2">
    <line x1="400" y1="100" x2="400" y2="1100" />
    <line x1="200" y1="300" x2="600" y2="300" />
    <line x1="200" y1="700" x2="600" y2="700" />
    <line x1="200" y1="300" x2="200" y2="500" />
    <line x1="600" y1="300" x2="600" y2="500" />
    <line x1="200" y1="700" x2="200" y2="900" />
    <line x1="600" y1="700" x2="600" y2="900" />
  </g>

  <!-- Glowing Flow Nodes -->
  <g fill="#18181b" stroke="#27272a" stroke-width="2">
    <rect x="320" y="150" width="160" height="60" rx="8" />
    <rect x="120" y="450" width="160" height="60" rx="8" />
    <rect x="520" y="450" width="160" height="60" rx="8" />
    <rect x="320" y="600" width="160" height="60" rx="8" />
    <rect x="120" y="850" width="160" height="60" rx="8" />
    <rect x="520" y="850" width="160" height="60" rx="8" />
    <rect x="320" y="1000" width="160" height="60" rx="8" />
  </g>

  <!-- Flowchart text labels -->
  <g font-family="monospace" font-size="10" fill="#71717a" text-anchor="middle">
    <text x="400" y="185">API GATEWAY</text>
    <text x="200" y="485">AUTH WORKER</text>
    <text x="600" y="485">DB ROUTER</text>
    <text x="400" y="635">MEMCACHE REDIS</text>
    <text x="200" y="885">QUEUE WORKER</text>
    <text x="600" y="885">NOTIFICATION</text>
    <text x="400" y="1035">CLIENT PORTAL</text>
  </g>

  <!-- Glowing neon red nodes -->
  <circle cx="400" cy="180" r="4" fill="#ff1e00" />
  <circle cx="200" cy="480" r="4" fill="#ff1e00" />
  <circle cx="600" cy="480" r="4" fill="#ff1e00" />
  <circle cx="400" cy="630" r="4" fill="#ff1e00" />
  <circle cx="200" cy="880" r="4" fill="#ff1e00" />
  <circle cx="600" cy="880" r="4" fill="#ff1e00" />
  <circle cx="400" cy="1030" r="4" fill="#ff1e00" />
</svg>